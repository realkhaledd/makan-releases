<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مَكَان — إعداد الوكالة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: #060a14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    direction: rtl;
  }
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
  }
  .logo {
    font-size: 36px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .sub {
    font-size: 13px;
    color: #9aabcc;
    margin-bottom: 36px;
  }
  .label {
    font-size: 11px;
    font-weight: 700;
    color: #9aabcc;
    text-align: right;
    display: block;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #e8eeff;
    font-size: 18px;
    font-weight: 700;
    font-family: monospace;
    outline: none;
    text-align: center;
    direction: ltr;
    letter-spacing: 2px;
    margin-bottom: 20px;
    transition: border-color .2s;
  }
  .input:focus { border-color: rgba(26,58,255,0.6); }
  .input::placeholder { color: #3e4f72; font-size: 14px; letter-spacing: 0; font-family: 'Cairo', sans-serif; }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #1a3aff, #0a1d99);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Cairo', sans-serif;
    cursor: pointer;
    transition: opacity .2s;
    box-shadow: 0 6px 24px rgba(26,58,255,0.35);
  }
  .btn:hover { opacity: .9; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,68,68,0.08);
    border: 1px solid rgba(255,68,68,0.2);
    color: #ff4444;
    font-size: 13px;
    display: none;
  }
  .hint {
    margin-top: 16px;
    font-size: 11px;
    color: #3e4f72;
    line-height: 1.7;
  }
  /* Blocked screen */
  .blocked { display: none; }
  .blocked-icon { font-size: 52px; margin-bottom: 16px; }
  .blocked-title { font-size: 20px; font-weight: 800; color: #ff4444; margin-bottom: 10px; }
  .blocked-msg { font-size: 13px; color: #9aabcc; line-height: 1.8; margin-bottom: 24px; }
  .wa-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 12px;
    background: #25d366;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    font-family: 'Cairo', sans-serif;
  }
  .change-code {
    margin-top: 14px;
    font-size: 11px;
    color: #3e4f72;
    cursor: pointer;
    background: none;
    border: none;
    font-family: 'Cairo', sans-serif;
  }
  .change-code:hover { color: #9aabcc; }
</style>
</head>
<body>
<div class="card" id="setupCard">
  <div class="logo">مَكَان</div>
  <div class="sub">نظام التشغيل العقاري</div>

  <label class="label">أدخل كود الوكالة</label>
  <input class="input" id="codeInput" placeholder="مثال: reem847" maxlength="20" autofocus
    oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9-]/g,'')"/>

  <button class="btn" id="enterBtn" onclick="submitCode()">دخول ←</button>

  <div class="error" id="errorMsg"></div>
  <div class="hint">
    الكود بتاخده من مزود الخدمة (مَكَان)<br>
    بيتحفظ تلقائياً بعد أول دخول
  </div>

  <div style="margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)">
    <button class="change-code" onclick="toggleAdminLogin()" style="font-size:12px;color:#3e4f72" id="adminToggleBtn">
      🔑 دخول الإدارة
    </button>
    <div id="adminLoginBox" style="display:none;margin-top:14px">
      <input class="input" id="adminPassInput" type="password" placeholder="كلمة مرور الإدارة" style="margin-bottom:10px;font-size:14px;letter-spacing:2px"/>
      <button class="btn" onclick="submitAdminPass()" style="background:linear-gradient(135deg,#7c3aed,#4c1d95)">دخول الإدارة ←</button>
      <div class="error" id="adminError" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<div class="card blocked" id="blockedCard">
  <div class="blocked-icon">🔒</div>
  <div class="blocked-title">تم إيقاف الاشتراك</div>
  <div class="blocked-msg">
    تم إيقاف اشتراك هذه الوكالة مؤقتاً.<br>
    للاستفسار أو تجديد الاشتراك تواصل مع مَكَان.
  </div>
  <a href="https://wa.me/971568679099" class="wa-btn" target="_blank">
    💬 تواصل معنا على واتساب
  </a>
  <br>
  <button class="change-code" onclick="resetAgency()">تغيير كود الوكالة</button>
</div>

<script>
const api = window.agencyAPI;

async function submitCode() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) return showError('أدخل كود الوكالة');

  const btn = document.getElementById('enterBtn');
  btn.disabled = true;
  btn.textContent = 'جاري التحقق...';
  hideError();

  try {
    // Check agency in Firebase
    const res = await fetch(
      `https://firestore.googleapis.com/v1/projects/makan-673c9/databases/(default)/documents/agencies/${code}`
    );
    const data = await res.json();

    if (data.error || !data.fields) {
      btn.disabled = false;
      btn.textContent = 'دخول ←';
      return showError('كود الوكالة غير صحيح — تأكد من الكود');
    }

    const active = data.fields?.active?.booleanValue;
    if (active === false) {
      document.getElementById('setupCard').style.display = 'none';
      document.getElementById('blockedCard').style.display = 'block';
      await api.set(code);
      return;
    }

    // Save & load app
    await api.set(code);
    await api.reload(code);

  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'دخول ←';
    showError('تعذر الاتصال — تأكد من الإنترنت');
  }
}

async function resetAgency() {
  await api.clear();
  document.getElementById('blockedCard').style.display = 'none';
  document.getElementById('setupCard').style.display = 'block';
  document.getElementById('codeInput').value = '';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

document.getElementById('codeInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCode();
});

function toggleAdminLogin() {
  const box = document.getElementById('adminLoginBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
  if (box.style.display === 'block') document.getElementById('adminPassInput').focus();
}

async function submitAdminPass() {
  const pass = document.getElementById('adminPassInput').value;
  const err  = document.getElementById('adminError');
  if (!pass) return;

  // Hash the input
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(pass));
  const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');

  // Fetch stored hash from Firestore
  try {
    const res  = await fetch('https://firestore.googleapis.com/v1/projects/makan-673c9/databases/(default)/documents/settings/superadmin');
    const data = await res.json();
    const storedHash = data?.fields?.passHash?.stringValue;
    if (!storedHash || hashHex !== storedHash) {
      err.textContent = '❌ كلمة المرور غير صحيحة';
      err.style.display = 'block';
      document.getElementById('adminPassInput').value = '';
      return;
    }
  } catch {
    err.textContent = '❌ تعذر التحقق — تأكد من الإنترنت';
    err.style.display = 'block';
    return;
  }

  await api.set('superadmin');
  await api.reload('superadmin');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('adminLoginBox').style.display !== 'none') {
    submitAdminPass();
  }
});
</script>
</body>
</html>
